<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta de Stock - KARDEX JD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <style>
        .search-highlight {
            background-color: #fef9c3 !important; /* Amarillo brillante para destacar */
            transition: background-color 0.3s ease-in-out;
        }
        .search-highlight td {
            background-color: inherit !important; /* Hereda el color de la fila para consistencia */
        }
    </style>
</head>
<body>
    <header>
        <h1>KARDEX JD</h1>
    </header>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h2>Consulta de Stock</h2>
            <div>
                <input type="text" id="searchInput" onkeyup="filterTable()" placeholder="Buscar por nombre o descripción..." style="padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; min-width: 300px;">
            </div>
        </div>
    
        <div class="kardex-tabla-contenedor">
            <table class="kardex-tabla">
                <thead>
                    <tr>
                        <th class="hdr-gris col-texto">Nombre</th>
                        <th class="hdr-gris col-texto">Descripción</th>
                        <th class="hdr-naranja">Stock Actual</th>
                    </tr>
                </thead>
                <tbody id="tabla-materiales">
                    {% for mat in materiales %}
                    <tr>
                        <td class="col-texto"><strong>{{ mat['nombre'] }}</strong></td>
                        <td class="col-texto">{{ mat['descripcion'] or '' }}</td>
                        <td class="celda-naranja" style="font-size: 16px; font-weight: bold; text-align: center;">{{ mat['stock'] }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" style="padding: 20px; text-align: center; color: #7f8c8d;">No hay materiales para mostrar.</td>
                    </tr>
                    {% endfor %}
                    <tr id="no-results" style="display: none;">
                        <td colspan="3" style="padding: 20px; text-align: center; color: #7f8c8d; background-color: #f8fafc;">
                            No se encontraron resultados para su búsqueda.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    
        <script>
            // Función para normalizar texto: quita tildes y convierte a minúsculas
            function normalizeText(text) {
                if (!text) return '';
                return text.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
            }

            function filterTable() {
                const input = document.getElementById('searchInput');
                const filter = normalizeText(input.value);
                const tbody = document.getElementById('tabla-materiales');
                const rows = tbody.getElementsByTagName('tr');
                let visibleRows = 0;
                let firstMatch = null;
    
                // 1. Limpiar resaltados anteriores
                for (let row of rows) {
                    if (row.id !== 'no-results') {
                        row.classList.remove('search-highlight');
                    }
                }

                // Si no hay búsqueda, simplemente mostramos todo y salimos.
                if (filter === '') {
                    for (let row of rows) {
                        if (row.id !== 'no-results') row.style.display = "";
                    }
                    document.getElementById('no-results').style.display = 'none';
                    return;
                }

                // 2. Filtrar filas y encontrar la primera coincidencia
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    if (row.id === 'no-results') continue;
    
                    const nameCell = row.getElementsByTagName("td")[0];
                    const descCell = row.getElementsByTagName("td")[1];
                    
                    const nameText = normalizeText(nameCell ? nameCell.textContent || nameCell.innerText : '');
                    const descText = normalizeText(descCell ? descCell.textContent || descCell.innerText : '');
                    
                    // Usamos .includes() que es más semántico que indexOf > -1
                    if (nameText.includes(filter) || descText.includes(filter)) {
                        row.style.display = "";
                        visibleRows++;
                        if (!firstMatch) firstMatch = row; // Guardamos la primera fila que coincide
                    } else {
                        row.style.display = "none";
                    }
                }

                // 3. Si encontramos una coincidencia, la resaltamos y hacemos scroll
                if (firstMatch) {
                    firstMatch.classList.add('search-highlight');
                    firstMatch.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }

                document.getElementById('no-results').style.display = visibleRows > 0 ? 'none' : '';
            }
    
            document.addEventListener('keydown', function(event) {
                if (event.ctrlKey && event.key === 'f') {
                    event.preventDefault();
                    document.getElementById('searchInput').focus();
                }
            });
        </script>
    </div>
</body>
</html>
